name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - python-version: "3.10"
            tox-env: py310
          - python-version: "3.11"
            tox-env: py311
          - python-version: "3.12"
            tox-env: py312
          - python-version: "3.13"
            tox-env: py313
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv python install ${{ matrix.python-version }}
      - run: uvx --with tox-uv tox run -e ${{ matrix.tox-env }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uvx --with tox-uv tox run -e lint

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uvx --with tox-uv tox run -e audit

  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - name: Smoke test wheel entry points
        run: |
          python3 -m venv .wheeltest
          . .wheeltest/bin/activate
          python -m pip install dist/*.whl
          davinci-resolve-checker --help
          davinci-resolve-checker --version
          python -m davinci_resolve_checker --help
      - name: Smoke test source distribution
        run: |
          python3 -m venv .sdisttest
          . .sdisttest/bin/activate
          python -m pip install dist/*.tar.gz
          davinci-resolve-checker --version
          python -m davinci_resolve_checker --help
