name: Release
on:
  push:
    tags: ["v*"]

permissions:
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uvx --with tox-uv tox run
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
