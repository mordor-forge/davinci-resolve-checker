name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uvx --with tox-uv tox run
      - name: Verify tag matches package version
        run: |
          test "${GITHUB_REF_NAME#v}" = "$(uv run python -c 'from davinci_resolve_checker import __version__; print(__version__)')"
      - run: uv build
      - name: Smoke test wheel entry points
        run: |
          python3 -m venv .wheeltest
          . .wheeltest/bin/activate
          python -m pip install dist/*.whl
          davinci-resolve-checker --help
          davinci-resolve-checker --version
          python -m davinci_resolve_checker --help
      - name: Smoke test source distribution
        run: |
          python3 -m venv .sdisttest
          . .sdisttest/bin/activate
          python -m pip install dist/*.tar.gz
          davinci-resolve-checker --version
          python -m davinci_resolve_checker --help
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/* --clobber
            echo "Updated existing GitHub release for $GITHUB_REF_NAME."
          else
            gh release create "$GITHUB_REF_NAME" dist/* \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi
